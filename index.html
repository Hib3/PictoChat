<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f6f1de">
    <title>PictoChat PWA</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <section id="loginView" class="login-view" aria-labelledby="loginTitle">
        <div class="login-panel picto-frame">
          <p class="brand">PICTOCHAT</p>
          <h1 id="loginTitle">名前を入れて開始</h1>
          <form id="loginForm" class="login-form" autocomplete="off">
            <label for="nameInput">ユーザー名</label>
            <input id="nameInput" name="name" type="text" inputmode="text" maxlength="16" required autofocus>
            <button type="submit">入室</button>
          </form>
        </div>
      </section>

      <main id="chatView" class="chat-view is-hidden" aria-label="チャット">
        <aside class="side-rail" aria-label="ツール">
          <div class="signal-icon">▥</div>
          <div class="rail-separator"></div>
          <nav class="channels" aria-label="チャンネル">
            <button class="channel-tab is-active" type="button" data-channel="0">A</button>
            <button class="channel-tab" type="button" data-channel="1">B</button>
            <button class="channel-tab" type="button" data-channel="2">C</button>
            <button class="channel-tab" type="button" data-channel="3">D</button>
          </nav>
          <div class="rail-separator"></div>
          <button id="penButton" class="rail-tool is-active" type="button" aria-label="ペン">╱</button>
          <button id="eraseButton" class="rail-tool" type="button" aria-label="消しゴム">▱</button>
          <button id="clearButton" class="rail-tool" type="button" aria-label="全消し">□</button>
        </aside>

        <section class="picto-stage">
          <header class="stripe-top">
            <button id="leaveButton" class="close-button" type="button" aria-label="退室">×</button>
          </header>

          <section class="title-plate" aria-label="タイトル">
            <span>PICT☻CHAT</span>
            <strong id="roomTitle">Room A</strong>
          </section>

          <section class="entry-bar">
            <span id="roomStatus">Now entering A</span>
          </section>

          <section class="input-strip">
            <span id="selfName" class="name-plate">Player</span>
            <input id="textInput" type="text" maxlength="80" placeholder="hello world :)">
          </section>

          <section id="messages" class="messages" aria-live="polite"></section>

          <section class="composer" aria-label="送信欄">
            <canvas id="drawCanvas" class="draw-canvas" width="640" height="300" aria-label="手書き入力"></canvas>
            <div class="keyboard-panel">
              <div id="keyboard" class="keyboard" aria-label="画面キーボード"></div>
              <div class="send-stack">
                <button class="arrow-button" type="button" aria-label="上">▲</button>
                <button id="sendButton" class="send-button" type="button">SEND</button>
                <button class="arrow-button" type="button" aria-label="下">▼</button>
                <button id="backspaceButton" class="arrow-button" type="button" aria-label="削除">←</button>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
